<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CEL Editor Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      min-height: 100vh;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #ffffff;
    }

    p.subtitle {
      font-size: 0.875rem;
      color: #888;
      margin-bottom: 1.5rem;
    }

    #editor-container {
      width: 100%;
      max-width: 720px;
      border: 1px solid #333;
      border-radius: 8px;
      overflow: hidden;
    }

    .cm-editor { font-size: 14px; }
    .cm-editor .cm-scroller { min-height: 200px; }
    .cm-editor.cm-focused { outline: none; }

    #status {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>codemirror-cel</h1>
  <p class="subtitle">CEL expression editor with LSP-powered completion and diagnostics</p>
  <div id="editor-container"></div>
  <div id="status">Loading WASM...</div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
